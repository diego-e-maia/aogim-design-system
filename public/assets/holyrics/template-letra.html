<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Letra - AOGIM Holyrics</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 1920px; height: 1080px;
      background: linear-gradient(135deg, #0d0d12 0%, #1a1a21 50%, #27272f 100%);
      display: flex; align-items: center; justify-content: center;
      font-family: 'Inter', Arial, sans-serif;
      color: white;
      overflow: hidden;
    }
    .verse {
      text-align: center;
      padding: 60px 120px;
      max-width: 1400px;
    }
    .verse p {
      font-size: 52px;
      line-height: 1.5;
      font-weight: 500;
      text-shadow: 0 2px 10px rgba(0,0,0,0.3);
    }
    .verse .highlight {
      color: #d68020;
    }
  </style>
</head>
<body>
  <div class="verse">
    <p>Este é o dia que o Senhor fez</p>
    <p>regozijemo-nos e alegremo-nos nele</p>
    <p class="highlight">Salmos 118:24</p>
  </div>
</body>
</html>
