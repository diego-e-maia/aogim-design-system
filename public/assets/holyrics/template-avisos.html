<!DOCTYPE html>
<html lang="pt">
<head>

      display: flex; align-items: center; justify-content: center;
      font-family: 'Inter', Arial, sans-serif;
      color: white;
      overflow: hidden;
    }
    .slide {
      text-align: center;
      padding: 60px 120px;
    }
    .tag {
      display: inline-block;
      padding: 8px 24px;
      background: rgba(214,128,32,0.15);
      color: #d68020;
      border-radius: 50px;
      font-size: 18px;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 30px;
    }
    h1 {
      font-size: 64px;
      font-weight: 700;
      margin-bottom: 20px;
    }
    p {
      font-size: 32px;
      color: #9fa0a9;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div class="slide">
    <div class="tag">Aviso</div>
    <h1>Escola Bíblica Dominical</h1>
    <p>Domingo às 9h — Venha aprender a Palavra de Deus</p>

</html>
